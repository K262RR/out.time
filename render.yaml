services:
  # Backend API сервис
  - type: web
    name: outtime-backend
    runtime: node
    plan: free
    rootDir: ./backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        value: https://outtime-backend.onrender.com
      - key: FRONTEND_URL
        value: https://your-project-name.vercel.app 