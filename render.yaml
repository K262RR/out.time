services:
  # PostgreSQL база данных
  - type: pserv
    name: outtime-db
    databaseName: outtime_prod
    user: outtime_user
    plan: free

  # Backend API сервис
  - type: web
    name: outtime-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: outtime-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        value: https://outtime-backend.onrender.com
      - key: FRONTEND_URL
        value: https://outtime-frontend.onrender.com

  # Frontend статический сайт
  - type: web
    name: outtime-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://outtime-backend.onrender.com/api 